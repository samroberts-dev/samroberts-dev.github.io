<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c0e;
      --surface: #13151a;
      --border: #22252e;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.12);
      --accent-glow: rgba(200, 240, 96, 0.25);
      --text-primary: #f0f2f5;
      --text-secondary: #6b7280;
      --text-muted: #374151;
      --danger: #ff4f4f;
      --danger-dim: rgba(255, 79, 79, 0.12);
      --warning: #ffb347;
      --radius: 16px;
      --font-display: 'Fraunces', Georgia, serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow behind the card */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.6s ease;
    }

    body.danger::after {
      background: radial-gradient(ellipse at center, rgba(255,79,79,0.18) 0%, transparent 70%);
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 56px 44px;
      width: min(520px, 95vw);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 64px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 36px;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ─────────────────────────────── */
    .header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      font-style: italic;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Display ─────────────────────────────── */
    .display-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .time-display {
      font-family: var(--font-mono);
      font-size: clamp(56px, 14vw, 80px);
      font-weight: 300;
      letter-spacing: -0.03em;
      color: var(--accent);
      line-height: 1;
      transition: color 0.4s ease;
      tabular-nums: true;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    .time-display.danger { color: var(--danger); }
    .time-display.warning { color: var(--warning); }

    .time-display.pulse {
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      transition: background 0.4s ease;
    }

    .dot.danger { background: var(--danger); }

    .dot.running {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .status-text {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ── Progress bar ─────────────────────────── */
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.25s linear, background 0.4s ease;
    }

    .progress-fill.danger { background: var(--danger); }
    .progress-fill.warning { background: var(--warning); }

    /* ── Set time inputs ─────────────────────── */
    .set-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .set-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .inputs-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .time-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .time-input-wrap span {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }

    .time-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 400;
      text-align: center;
      padding: 12px 6px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .time-input::-webkit-inner-spin-button,
    .time-input::-webkit-outer-spin-button { display: none; }

    .time-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* ── Quick presets ───────────────────────── */
    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preset-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .preset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Controls ────────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 14px 20px;
      cursor: pointer;
      transition: all 0.18s ease;
      outline: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #0b0c0e;
      grid-column: span 2;
      font-size: 13px;
      padding: 16px;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      filter: none !important;
    }

    /* ── Finished overlay ────────────────────── */
    .finished-overlay {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: rgba(11, 12, 14, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .finished-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .finished-icon {
      font-size: 48px;
      animation: bounce 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes bounce {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .finished-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      font-style: italic;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .finished-sub {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .btn-dismiss {
      margin-top: 8px;
      background: var(--accent);
      color: #0b0c0e;
      border: none;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 12px 28px;
      cursor: pointer;
      transition: filter 0.18s;
    }

    .btn-dismiss:hover { filter: brightness(1.1); }

    /* ── Divider ─────────────────────────────── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <!-- Finished overlay -->
  <div class="finished-overlay" id="overlay">
    <div class="finished-icon">🐔</div>
    <div class="finished-title">Time's up.</div>
    <div class="finished-sub">🌳 BWAAAAAK 🌳</div>
    <button class="btn-dismiss" onclick="dismiss()">Dismiss</button>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="label">Countdown</div>
    <div class="title">Timer</div>
  </div>

  <!-- Time display + progress -->
  <div class="display-wrap">
    <div class="time-display" id="display">00:00:00</div>
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <div class="status-text" id="statusText">Ready</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:100%"></div>
    </div>
  </div>

  <hr />

  <!-- Set time -->
  <div class="set-section">
    <div class="set-label">Set Duration</div>
    <div class="inputs-row">
      <div class="time-input-wrap">
        <input class="time-input" type="number" id="inpH" min="0" max="99" value="0" placeholder="0" />
        <span>Hours</span>
      </div>
      <div class="time-input-wrap">
        <input class="time-input" type="number" id="inpM" min="0" max="59" value="5" placeholder="0" />
        <span>Min</span>
      </div>
      <div class="time-input-wrap">
        <input class="time-input" type="number" id="inpS" min="0" max="59" value="0" placeholder="0" />
        <span>Sec</span>
      </div>
    </div>

    <!-- Presets -->
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(0,1,0)">1 min</button>
      <button class="preset-btn" onclick="setPreset(0,5,0)">5 min</button>
      <button class="preset-btn" onclick="setPreset(0,10,0)">10 min</button>
      <button class="preset-btn" onclick="setPreset(0,25,0)">25 min</button>
      <button class="preset-btn" onclick="setPreset(1,0,0)">1 hour</button>
    </div>
  </div>

  <hr />

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" id="btnStart" onclick="startStop()">▶ Start</button>
    <button class="btn btn-secondary" id="btnReset" onclick="reset()">Reset</button>
    <button class="btn btn-secondary" id="btnAdd" onclick="addTime(60)" disabled>+ 1 min</button>
  </div>
</div>

<script>
  let totalSeconds = 0;
  let remaining = 0;
  let intervalId = null;
  let running = false;
  let beepCtx = null;

  const display = document.getElementById('display');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const progressFill = document.getElementById('progressFill');
  const btnStart = document.getElementById('btnStart');
  const btnAdd = document.getElementById('btnAdd');
  const overlay = document.getElementById('overlay');

  function fmt(n) { return String(n).padStart(2, '0'); }

  function updateDisplay() {
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    display.textContent = `${fmt(h)}:${fmt(m)}:${fmt(s)}`;

    const pct = totalSeconds > 0 ? (remaining / totalSeconds) * 100 : 100;
    progressFill.style.width = pct + '%';

    // Colour states
    const isDanger = remaining <= 10 && remaining > 0;
    const isWarning = remaining <= 60 && remaining > 10;

    display.classList.toggle('danger', isDanger);
    display.classList.toggle('warning', isWarning);
    progressFill.classList.toggle('danger', isDanger);
    progressFill.classList.toggle('warning', isWarning);
    dot.classList.toggle('danger', isDanger);
    document.body.classList.toggle('danger', isDanger);
  }

  function getInputSeconds() {
    const h = parseInt(document.getElementById('inpH').value) || 0;
    const m = parseInt(document.getElementById('inpM').value) || 0;
    const s = parseInt(document.getElementById('inpS').value) || 0;
    return h * 3600 + m * 60 + s;
  }

  function setPreset(h, m, s) {
    document.getElementById('inpH').value = h;
    document.getElementById('inpM').value = m;
    document.getElementById('inpS').value = s;
    if (!running) {
      remaining = h * 3600 + m * 60 + s;
      totalSeconds = remaining;
      updateDisplay();
    }
  }

  function startStop() {
    if (running) {
      pause();
    } else {
      start();
    }
  }

  function start() {
    const secs = getInputSeconds();
    if (!running && remaining === 0) {
      if (secs <= 0) return;
      totalSeconds = secs;
      remaining = secs;
    }
    if (remaining <= 0) return;

    running = true;
    dot.classList.add('running');
    statusText.textContent = 'Running';
    btnStart.textContent = '⏸ Pause';
    btnAdd.disabled = false;
    setInputsDisabled(true);

    intervalId = setInterval(() => {
      remaining--;
      updateDisplay();

      if (remaining <= 10 && remaining > 0) {
        beep(880, 0.06, 0.08);
      }

      if (remaining <= 0) {
        finish();
      }
    }, 1000);

    updateDisplay();
  }

  function pause() {
    running = false;
    clearInterval(intervalId);
    dot.classList.remove('running');
    statusText.textContent = 'Paused';
    btnStart.textContent = '▶ Resume';
  }

  function reset() {
    running = false;
    clearInterval(intervalId);
    remaining = 0;
    totalSeconds = 0;
    dot.classList.remove('running', 'danger');
    display.classList.remove('danger', 'warning');
    progressFill.classList.remove('danger', 'warning');
    document.body.classList.remove('danger');
    statusText.textContent = 'Ready';
    btnStart.textContent = '▶ Start';
    btnAdd.disabled = true;
    setInputsDisabled(false);
    progressFill.style.width = '100%';
    display.textContent = '00:00:00';
    overlay.classList.remove('show');
  }

  function addTime(secs) {
    remaining = Math.min(remaining + secs, 99 * 3600 + 59 * 60 + 59);
    totalSeconds += secs;
    display.classList.add('pulse');
    display.addEventListener('animationend', () => display.classList.remove('pulse'), { once: true });
    updateDisplay();
  }

  function finish() {
    running = false;
    clearInterval(intervalId);
    dot.classList.remove('running');
    statusText.textContent = 'Finished';
    btnStart.textContent = '▶ Start';
    btnAdd.disabled = true;
    overlay.classList.add('show');
    beepSequence();
  }

  function dismiss() {
    overlay.classList.remove('show');
    reset();
  }

  function setInputsDisabled(val) {
    ['inpH','inpM','inpS'].forEach(id => document.getElementById(id).disabled = val);
    document.querySelectorAll('.preset-btn').forEach(b => b.disabled = val);
  }

  // ── Audio ──────────────────────────────────
  function getAudioCtx() {
    if (!beepCtx) beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    return beepCtx;
  }

  function beep(freq, vol, duration) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }
